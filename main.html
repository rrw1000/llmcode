<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coding Assistant</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="menu-bar">
    <div class="menu-left">
      <div class="menu-item">
        <span class="menu-label">File</span>
        <div class="menu-dropdown">
          <div class="menu-option" id="resetBtn">Reset</div>
          <div class="menu-option" id="logoutBtn">Logout</div>
        </div>
      </div>
      <div class="menu-item">
        <span class="menu-label">Download</span>
        <div class="menu-dropdown">
          <div class="menu-option" id="downloadBtn">Code</div>
          <div class="menu-option" id="downloadSessionBtn">Conversation</div>
          <div class="menu-option" id="downloadCreationBtn">Creation</div>
        </div>
      </div>
    </div>
    <div class="menu-right">
      <div class="menu-item">
        <span class="menu-label">Help</span>
        <div class="menu-dropdown">
          <div class="menu-option" id="versionBtn">Version</div>
        </div>
      </div>
    </div>
  </div>
  <div class="app-container">
    <div class="left-pane">
      <div class="code-section">
        <div class="section-header">
          <h2>Code Editor</h2>
          <button id="runBtn" class="run-btn">Run</button>
        </div>
        <textarea id="codeEditor" spellcheck="false"></textarea>
      </div>
      <div class="command-section">
        <div class="section-header">
          <h2>AI Assistant</h2>
          <button id="clearChatBtn" class="clear-btn">Clear</button>
        </div>
        <div id="chatHistory"></div>
        <div class="command-input">
          <textarea id="commandInput" placeholder="Describe the code you want to write..."></textarea>
          <button id="sendBtn">Send</button>
        </div>
      </div>
    </div>
    <div class="right-pane">
      <div class="section-header">
        <h2>Preview</h2>
        <button id="clearPreviewBtn" class="clear-btn">Clear</button>
      </div>
      <iframe id="preview" sandbox="allow-scripts allow-modals allow-forms allow-popups"></iframe>
    </div>
  </div>
  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <p>Generating code...</p>
  </div>
  <div id="versionDialog" class="dialog-overlay">
    <div class="dialog">
      <h3>Version</h3>
      <p>Coding Assistant v0.2</p>
      <button class="dialog-close" id="closeDialogBtn">OK</button>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
