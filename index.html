<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coding Assistant - Setup</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      max-width: 450px;
      width: 90%;
    }
    h1 {
      color: #1a1a2e;
      margin-bottom: 10px;
      font-size: 24px;
    }
    p {
      color: #666;
      margin-bottom: 25px;
      font-size: 14px;
    }
    label {
      display: block;
      color: #333;
      font-weight: 500;
      margin-bottom: 8px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: #4a90d9;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.3s;
    }
    button:hover {
      background: #357abd;
    }
    .error {
      color: #d32f2f;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Coding Assistant</h1>
    <p>Enter your Google Cloud API key to get started. The key will be stored in your browser's local storage.</p>
    <form id="keyForm">
      <label for="apiKey">Google Cloud API Key</label>
      <input type="password" id="apiKey" name="apiKey" placeholder="Enter your API key" required>
      <div class="error" id="errorMsg">Please enter a valid API key.</div>
      <button type="submit">Continue</button>
    </form>
  </div>
  <script>
    document.getElementById('keyForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const apiKey = document.getElementById('apiKey').value.trim();
      if (apiKey) {
        localStorage.setItem('gcApiKey', apiKey);
        window.location.href = 'main.html';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
      }
    });
    window.addEventListener('load', function() {
      if (localStorage.getItem('gcApiKey')) {
        window.location.href = 'main.html';
      }
    });
  </script>
</body>
</html>
